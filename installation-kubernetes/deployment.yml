---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: conveior
  labels:
    app: conveior
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app: conveior
  template:
    metadata:
      labels:
        app: conveior
    spec:
      containers:
        - name: conveior
          image: "lukaspastva/conveior:0.1.1"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: S3_KEY
              valueFrom:
                secretKeyRef:
                  name: conveior
                  key: CONVEIOR_S3_KEY
            - name: S3_SECRET
              valueFrom:
                secretKeyRef:
                  name: conveior
                  key: CONVEIOR_S3_SECRET
            - name: S3_URL
              valueFrom:
                secretKeyRef:
                  name: conveior
                  key: CONVEIOR_S3_URL
          volumeMounts:
            - name: conveior
              mountPath: /var/run/docker.sock
              readOnly: true
      volumes:
      - name: conveior
        hostPath:
          path: /var/run/docker.sock