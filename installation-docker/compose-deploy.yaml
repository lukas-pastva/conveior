version: '3.8'

services:

  conveior:
    container_name: "conveior"
    image: "lukaspastva/conveior:latest"
    environment:
      S3_KEY: "${S3_KEY}"
      S3_SECRET: "${S3_SECRET}"
      S3_URL: "${S3_URL}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - conveior-config.yaml:/home/conveior-config.yaml