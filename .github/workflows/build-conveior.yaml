name: build-conveior

on:
  push:
    branches:
      - main

jobs:
  build-conveior:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: build
        run: |
          VERSION=$(git describe | awk -F '-' '{print $1}')
          docker login registry.hub.docker.com -u "${{ secrets.DOCKER_HUB_USERNAME }}" -p "${{ secrets.DOCKER_HUB_PASSWORD }}"
          docker build -f ./source-codes/web/Dockerfile -t conveior:latest .
          docker tag conveior:latest registry.hub.docker.com/lukaspastva/conveior:${VERSION}
          docker push registry.hub.docker.com/lukaspastva/conveior:latest
          docker push registry.hub.docker.com/lukaspastva/conveior:${VERSION}

        
